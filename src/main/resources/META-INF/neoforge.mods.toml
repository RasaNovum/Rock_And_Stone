description = '''A world generation mod that changes ore distribution to match a set of climate/environment values.'''
authors = "Rasa Novum"
displayURL = "https://rasanovum.ca"
logoFile = "assets/rockandstone/icon.png"

[[mixins]]
config = "rockandstone.mixins.json"

[[dependencies.rockandstone]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.rockandstone]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.rockandstone]]
modId = "midnightlib"
type = "required"
versionRange = "[1.9.0,)"
ordering = "NONE"
side = "BOTH"
