modLoader = "javafml"
loaderVersion = "[4,)"
license = "RSL-1.0"
issueTrackerURL = "https://github.com/RasaNovum/Rock_And_Stone/issues"

[[mods]]
modId = "rockandstone"
version = "${version}"
